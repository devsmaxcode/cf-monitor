name: CI/CD - CF Monitor

on:
  workflow_dispatch:

concurrency:
  group: cf-monitor-production
  cancel-in-progress: false

env:
  APP_PORT: ${{ vars.APP_PORT || '3033' }}
  APP_HOST: ${{ vars.APP_HOST || '127.0.0.1' }}
  PM2_APP_NAME: ${{ vars.PM2_APP_NAME || 'cf-cache-monitor' }}
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/home/irdfoundation-cf-monitor/htdocs/cf-monitor.irdfoundation.com' }}
  APP_URL: ${{ vars.APP_URL || 'https://cf-monitor.irdfoundation.com' }}
  METRICS_DB_FILE: storage/cloudflare-cache-metrics.sqlite

jobs:
  ci:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Upload Start Build
        uses: actions/upload-artifact@v4
        with:
          name: start-build
          path: dist/
          if-no-files-found: error

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: ci
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Start Build
        uses: actions/download-artifact@v4
        with:
          name: start-build
          path: dist

      - name: Validate Deploy Config
        run: |
          : "${DEPLOY_HOST:?Missing DEPLOY_HOST secret}"
          : "${DEPLOY_USER:?Missing DEPLOY_USER secret}"
          : "${DEPLOY_SSH_KEY:?Missing DEPLOY_SSH_KEY secret}"
          : "${DEPLOY_PATH:?Missing DEPLOY_PATH variable}"
          : "${APP_PORT:?Missing APP_PORT variable}"
          : "${APP_HOST:?Missing APP_HOST variable}"
          : "${PM2_APP_NAME:?Missing PM2_APP_NAME variable}"
          : "${METRICS_DB_FILE:?Missing METRICS_DB_FILE variable}"
          [[ "$DEPLOY_PATH" == /* ]] || { echo "DEPLOY_PATH must be absolute"; exit 1; }
          IFS='/' read -r -a deploy_path_parts <<< "$DEPLOY_PATH"
          (( ${#deploy_path_parts[@]} >= 5 )) || { echo "Refusing shallow DEPLOY_PATH=$DEPLOY_PATH"; exit 1; }
          case "$DEPLOY_PATH" in
            "/"|"/home"|"/home/"|"/var"|"/var/"|"/srv"|"/srv/"|"/tmp"|"/tmp/")
              echo "Refusing unsafe DEPLOY_PATH=$DEPLOY_PATH"
              exit 1
              ;;
          esac

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
          sed -i 's/\r$//' ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Validate Sudo Access
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "sudo -n -i true"

      - name: Prepare Remote Directory
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo -i mkdir -p '$DEPLOY_PATH' '$DEPLOY_PATH/storage' '$DEPLOY_PATH/dist'"

      - name: Backup Persistent Database
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo -Hiu root bash -s -- '$DEPLOY_PATH' '$METRICS_DB_FILE'" <<'EOF'
          set -euo pipefail

          DEPLOY_PATH="$1"
          METRICS_DB_FILE="$2"
          DB_PATH="$DEPLOY_PATH/$METRICS_DB_FILE"
          BACKUP_DIR="$DEPLOY_PATH/storage/backups"

          mkdir -p "$BACKUP_DIR"
          if [ -f "$DB_PATH" ]; then
            STAMP="$(date -u +%Y%m%d%H%M%S)"
            cp -p "$DB_PATH" "$BACKUP_DIR/cloudflare-cache-metrics.$STAMP.sqlite"
            find "$BACKUP_DIR" -type f -name 'cloudflare-cache-metrics.*.sqlite' \
              -printf '%T@ %p\n' | sort -rn | awk 'NR>5 {print $2}' | xargs -r rm -f
          fi
          EOF

      - name: Sync Project Files
        run: |
          rsync -az --delete \
            -e "ssh -p $DEPLOY_PORT" \
            --rsync-path "sudo rsync" \
            --filter "protect /storage/***" \
            --filter "protect /data/***" \
            --filter "protect /database/***" \
            --filter "protect /backups/***" \
            --filter "protect /*.db" \
            --filter "protect /*.sqlite" \
            --filter "protect /*.sqlite3" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "node_modules/" \
            --exclude "storage/" \
            --exclude "data/" \
            --exclude "database/" \
            --exclude "backups/" \
            --exclude "*.db" \
            --exclude "*.sqlite" \
            --exclude "*.sqlite3" \
            --exclude "*.log" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Bootstrap Storage Defaults
        run: |
          rsync -az --ignore-existing \
            -e "ssh -p $DEPLOY_PORT" \
            --rsync-path "sudo rsync" \
            --include "storage/" \
            --include "storage/*.json" \
            --include "storage/*.txt" \
            --exclude "*" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Verify Persistent Database
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo -Hiu root bash -s -- '$DEPLOY_PATH' '$METRICS_DB_FILE'" <<'EOF'
          set -euo pipefail

          DEPLOY_PATH="$1"
          METRICS_DB_FILE="$2"
          DB_PATH="$DEPLOY_PATH/$METRICS_DB_FILE"

          if [ -f "$DB_PATH" ]; then
            test -s "$DB_PATH"
            echo "Persistent database is present: $DB_PATH"
          else
            echo "Persistent database does not exist yet; app will create it on first run."
          fi
          EOF

      - name: Install And Restart App
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo -Hiu root bash -s -- '$DEPLOY_PATH' '$APP_PORT' '$APP_HOST' '$PM2_APP_NAME' '$DEPLOY_USER'" <<'EOF'
          set -euo pipefail

          DEPLOY_PATH="$1"
          APP_PORT="$2"
          APP_HOST="$3"
          PM2_APP_NAME="$4"
          DEPLOY_LOGIN_USER="$5"

          export PATH="/home/$DEPLOY_LOGIN_USER/.bun/bin:$HOME/.bun/bin:/root/.bun/bin:/usr/local/bin:/usr/bin:$PATH"
          if [ -s "$HOME/.nvm/nvm.sh" ]; then
            # shellcheck disable=SC1090
            . "$HOME/.nvm/nvm.sh"
            nvm use --silent default >/dev/null 2>&1 || true
          fi
          cd "$DEPLOY_PATH"

          command -v bun
          command -v pm2

          bun install --production --frozen-lockfile --ignore-scripts

          export APP_ROOT="$DEPLOY_PATH"
          export APP_HOST
          export BUN_BIN="$(command -v bun)"
          export HOST="$APP_HOST"
          export NODE_ENV=production
          export PORT="$APP_PORT"
          export PM2_APP_NAME
          pm2 startOrReload ecosystem.config.cjs --update-env
          pm2 save

          pm2 describe "$PM2_APP_NAME" >/dev/null
          bun --eval "const res = await fetch('http://127.0.0.1:$APP_PORT/'); if (!res.ok) process.exit(1);"
          EOF

      - name: Public Health Check
        run: curl --fail --silent --show-error "$APP_URL/" >/dev/null
